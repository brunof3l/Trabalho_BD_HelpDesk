<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Auditoria de TI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #fff;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 22px; text-align: center; margin-bottom: 25px; color: #1a202c; }
    .input-group { margin-bottom: 12px; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #3182ce; box-shadow: 0 0 0 2px rgba(49,130,206,0.1); }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-main { background: #3182ce; color: #fff; margin-top: 10px; }
    .btn-main:hover { background: #2b6cb0; }
    .btn-main:disabled { background: #cbd5e0; cursor: not-allowed; }
    .toggle-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #4a5568;
      text-decoration: none;
      cursor: pointer;
    }
    .toggle-link span { color: #3182ce; font-weight: 600; }
    .resultado { margin-top: 20px; text-align: center; font-size: 13px; font-weight: 500; }
    .hidden { display: none; }
    .status-ok { color: #38a169; }
    .status-erro { color: #e53e3e; }
    .status-neutro { color: #4a5568; }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.hidden {
      display: none;
    }
    .floating-card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
      padding: 28px;
      text-align: center;
    }
    .floating-card h2 {
      font-size: 22px;
      color: #1a202c;
      margin-bottom: 10px;
    }
    .floating-card p {
      color: #4a5568;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>

  <div class="card" id="card-login">
    <h1>Acesso Auditoria de TI</h1>
    <div class="input-group"><input type="email" id="login-email" placeholder="E-mail corporativo" autocomplete="email"></div>
    <div class="input-group"><input type="password" id="login-senha" placeholder="Senha" autocomplete="current-password"></div>
    <button id="btn-login" class="btn-main">Acessar Sistema</button>
    <a class="toggle-link" id="go-to-cadastro">Nao tem conta? <span>Criar agora</span></a>
    <div id="res-login" class="resultado"></div>
  </div>

  <div class="card hidden" id="card-cadastro">
    <h1>Nova Conta</h1>
    <div class="input-group"><input type="text" id="cad-nome" placeholder="Nome Completo" autocomplete="name"></div>
    <div class="input-group"><input type="email" id="cad-email" placeholder="E-mail" autocomplete="email"></div>
    <div class="input-group"><input type="password" id="cad-senha" placeholder="Senha (min. 6 caracteres)" autocomplete="new-password"></div>
    <div class="input-group"><input type="password" id="cad-confirma" placeholder="Confirmar Senha" autocomplete="new-password"></div>
    <button id="btn-cadastrar" class="btn-main">Finalizar Cadastro</button>
    <a class="toggle-link" id="go-to-login">Ja sou cadastrado. <span>Fazer Login</span></a>
    <div id="res-cad" class="resultado"></div>
  </div>

  <div class="overlay hidden" id="cadastro-sucesso-overlay">
    <div class="floating-card">
      <h2>Cadastro realizado com sucesso</h2>
      <p id="cadastro-sucesso-texto">Sua conta foi criada. Agora faca login para entrar no sistema.</p>
      <button id="btn-ir-login" class="btn-main">Fazer login</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAch2KSa3odfakiNsIIsBp2mHcC-766SbI",
      authDomain: "sistema-de-auditoria-de-ti.firebaseapp.com",
      projectId: "sistema-de-auditoria-de-ti",
      storageBucket: "sistema-de-auditoria-de-ti.firebasestorage.app",
      messagingSenderId: "324210445904",
      appId: "1:324210445904:web:095b5e2f5935abcd154b55"
    };

    const AUTH_API_URL = "http://localhost:3001/auth";
    const STATUS_API_URL = "/status";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const cardLogin = document.getElementById("card-login");
    const cardCad = document.getElementById("card-cadastro");
    const btnLogin = document.getElementById("btn-login");
    const btnCadastrar = document.getElementById("btn-cadastrar");
    const resLogin = document.getElementById("res-login");
    const resCad = document.getElementById("res-cad");
    const cadastroSucessoOverlay = document.getElementById("cadastro-sucesso-overlay");
    const cadastroSucessoTexto = document.getElementById("cadastro-sucesso-texto");
    const btnIrLogin = document.getElementById("btn-ir-login");

    function limparResultados() {
      resLogin.className = "resultado";
      resCad.className = "resultado";
      resLogin.textContent = "";
      resCad.textContent = "";
    }

    function alternarTelas(mostrarCadastro) {
      limparResultados();
      cadastroSucessoOverlay.classList.add("hidden");
      cardLogin.classList.toggle("hidden", mostrarCadastro);
      cardCad.classList.toggle("hidden", !mostrarCadastro);
    }

    function mostrarSucessoCadastro(nome, email) {
      cadastroSucessoTexto.textContent = `Conta criada com sucesso para ${nome || email}. Agora faca login para entrar no sistema.`;
      cadastroSucessoOverlay.classList.remove("hidden");
      document.getElementById("login-email").value = email || "";
      document.getElementById("login-senha").value = "";
      document.getElementById("cad-nome").value = "";
      document.getElementById("cad-email").value = "";
      document.getElementById("cad-senha").value = "";
      document.getElementById("cad-confirma").value = "";
    }

    function setLoading(botao, resultado, mensagem) {
      botao.disabled = true;
      resultado.className = "resultado status-neutro";
      resultado.textContent = mensagem;
    }

    function clearLoading(botao) {
      botao.disabled = false;
    }

    function criarErro(codigo, mensagem) {
      const error = new Error(mensagem);
      error.code = codigo;
      return error;
    }

    function formatarErro(error) {
      const codigo = error?.code || "erro/desconhecido";
      const mensagem = error?.message || "Erro desconhecido.";
      if (codigo === "auth/configuration-not-found") {
        return "auth/configuration-not-found: Habilite o provedor E-mail/Senha no Firebase Console em Authentication > Sign-in method.";
      }
      return `${codigo}: ${mensagem}`;
    }

    function logAutenticacao(origem, user, status, token) {
      console.group("Autenticacao do usuario");
      console.log("Origem:", origem);
      console.log("UID:", user?.uid || null);
      console.log("Nome:", user?.displayName || null);
      console.log("Email:", user?.email || null);
      console.log("Token Firebase:", token || null);
      console.log("MySQL:", status?.mysql || null);
      console.log("SQLite:", status?.sqlite || null);
      console.log("Horario:", new Date().toLocaleString("pt-BR"));
      console.groupEnd();
    }

    async function finalizaAuth(user, resDiv) {
      const token = await user.getIdToken(true);

      let authResponse;
      try {
        authResponse = await fetch(AUTH_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });
      } catch (e) {
        throw criarErro("node/offline", "Nao foi possivel conectar ao servidor Node.js para validar a sessao.");
      }

      if (!authResponse.ok) {
        let detalhe = "";
        try {
          const data = await authResponse.json();
          detalhe = data?.details?.message || data?.error || "";
        } catch (e) {
          detalhe = "";
        }
        throw criarErro("node/auth-error", detalhe || "O servidor Node.js recusou a validacao da sessao.");
      }

      let statusRes;
      try {
        statusRes = await fetch(STATUS_API_URL);
      } catch (e) {
        throw criarErro("node/offline", "Nao foi possivel conectar ao servidor Node.js para consultar o status dos bancos.");
      }

      if (!statusRes.ok) {
        throw criarErro("node/status-error", "O servidor Node.js nao conseguiu retornar o status dos bancos.");
      }

      const status = await statusRes.json();
      logAutenticacao("frontend", user, status, token);
      sessionStorage.setItem("idToken", token);
      sessionStorage.setItem("userEmail", user.email || "");
      sessionStorage.setItem("userName", user.displayName || "");
      resDiv.className = "resultado status-ok";
      resDiv.innerHTML = `Autenticado: ${user.displayName || user.email}<br>MySQL: ${status.mysql} | SQLite: ${status.sqlite}<br>Redirecionando para o dashboard...`;
      window.location.href = "/dashboard.html";
    }

    document.getElementById("go-to-cadastro").onclick = () => alternarTelas(true);
    document.getElementById("go-to-login").onclick = () => alternarTelas(false);
    btnIrLogin.onclick = () => {
      cadastroSucessoOverlay.classList.add("hidden");
      alternarTelas(false);
      document.getElementById("login-senha").focus();
    };

    btnLogin.onclick = async () => {
      const email = document.getElementById("login-email").value.trim();
      const senha = document.getElementById("login-senha").value;

      if (!email || !senha) {
        resLogin.className = "resultado status-erro";
        resLogin.textContent = "Preencha e-mail e senha.";
        return;
      }

      setLoading(btnLogin, resLogin, "Validando acesso...");

      try {
        const cred = await signInWithEmailAndPassword(auth, email, senha);
        await finalizaAuth(cred.user, resLogin);
      } catch (error) {
        console.log(error);
        resLogin.className = "resultado status-erro";
        resLogin.textContent = formatarErro(error);
      } finally {
        clearLoading(btnLogin);
      }
    };

    btnCadastrar.onclick = async () => {
      const nome = document.getElementById("cad-nome").value.trim();
      const email = document.getElementById("cad-email").value.trim();
      const senha = document.getElementById("cad-senha").value;
      const confirma = document.getElementById("cad-confirma").value;

      if (!nome || !email || !senha || !confirma) {
        resCad.className = "resultado status-erro";
        resCad.textContent = "Preencha todos os campos.";
        return;
      }

      if (senha !== confirma) {
        resCad.className = "resultado status-erro";
        resCad.textContent = "Senhas nao conferem.";
        return;
      }

      setLoading(btnCadastrar, resCad, "Criando conta...");

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, senha);
        await updateProfile(cred.user, { displayName: nome });
        await auth.signOut();
        sessionStorage.clear();
        mostrarSucessoCadastro(nome, email);
      } catch (error) {
        console.log(error);
        resCad.className = "resultado status-erro";
        resCad.textContent = formatarErro(error);
      } finally {
        clearLoading(btnCadastrar);
      }
    };
  </script>
</body>
</html>
