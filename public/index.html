<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auditoria de TI - Acesso</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }

    .login-container {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 30px;
      color: #1a202c;
    }

    .input-group {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: #3182ce;
      box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #3182ce;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      background-color: #2b6cb0;
    }

    button:disabled {
      background-color: #a0aec0;
      cursor: not-allowed;
    }

    #resultado {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      min-height: 20px;
      line-height: 1.5;
    }

    .status-ok { color: #38a169; }
    .status-erro { color: #e53e3e; }
    .status-neutro { color: #718096; }
  </style>
</head>
<body>

  <div class="login-container">
    <h1>Auditoria de TI</h1>

    <div class="input-group">
      <input type="email" id="email" placeholder="E-mail corporativo" autocomplete="email" />
    </div>

    <div class="input-group">
      <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" />
    </div>

    <button id="entrar">Acessar Sistema</button>

    <p id="resultado"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAch2KSa3odfakiNsIIsBp2mHcC-766SbI",
      authDomain: "sistema-de-auditoria-de-ti.firebaseapp.com",
      projectId: "sistema-de-auditoria-de-ti",
      storageBucket: "sistema-de-auditoria-de-ti.firebasestorage.app",
      messagingSenderId: "324210445904",
      appId: "1:324210445904:web:095b5e2f5935abcd154b55"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const botao = document.getElementById("entrar");
    const resultado = document.getElementById("resultado");

    async function fetchJson(url, options) {
      const resp = await fetch(url, options);
      const data = await resp.json().catch(() => ({}));
      return { ok: resp.ok, status: resp.status, data };
    }

    botao.addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      if (!email || !senha) {
        resultado.textContent = "⚠️ Por favor, preencha o e-mail e a senha.";
        resultado.className = "status-erro";
        return;
      }

      resultado.textContent = "Autenticando de forma segura...";
      resultado.className = "status-neutro";
      botao.disabled = true;
      botao.textContent = "Aguarde...";

      try {
        const credencial = await signInWithEmailAndPassword(auth, email, senha);
        const token = await credencial.user.getIdToken(true);

        const host = window.location.hostname;
        const AUTH_ORIGIN = `http://${host}:3001`;
        const WRITE_ORIGIN = `http://${host}:3002`;
        const READ_ORIGIN = window.location.origin;

        const loginResponse = await fetchJson(`${AUTH_ORIGIN}/auth`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token })
        });

        if (!loginResponse.ok) {
          throw new Error("Sessão recusada pelo servidor.");
        }

        const [writeStatus, readStatus] = await Promise.all([
          fetchJson(`${WRITE_ORIGIN}/health`),
          fetchJson(`${READ_ORIGIN}/health`)
        ]);

        const mysqlOk = Boolean(writeStatus.data?.services?.mysqlOk);
        const sqliteOk = Boolean(readStatus.data?.services?.sqliteOk);
        const mysqlText = mysqlOk ? "OK" : `ERRO${writeStatus.data?.errors?.mysqlError ? ` (${writeStatus.data.errors.mysqlError})` : ""}`;
        const sqliteText = sqliteOk ? "OK" : `ERRO${readStatus.data?.errors?.sqliteError ? ` (${readStatus.data.errors.sqliteError})` : ""}`;

        resultado.className = "status-ok";
        resultado.innerHTML = `
          ✅ <strong>Autenticação concluída!</strong><br>
          <span style="font-size: 13px; color: #4a5568;">
            Banco 2 (MySQL): ${mysqlText}<br>
            Banco 3 (SQLite): ${sqliteText}
          </span>
        `;

        sessionStorage.setItem("idToken", token);
        sessionStorage.setItem("userEmail", email);
        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 600);
      } catch (error) {
        resultado.className = "status-erro";
        resultado.textContent = "❌ Acesso negado. Verifique suas credenciais.";
      } finally {
        botao.disabled = false;
        botao.textContent = "Acessar Sistema";
      }
    });
  </script>
</body>
</html>
